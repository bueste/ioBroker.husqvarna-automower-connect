version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: monthly
          time: '04:00'
          timezone: Europe/Zurich
      open-pull-requests-limit: 5
      assignees:
          - bueste
      versioning-strategy: increase
      cooldown:
          default: 7
      ignore:
          - dependency-name: '@types/node'
            update-types: ['version-update:semver-major']

    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: monthly
          time: '04:00'
          timezone: Europe/Zurich
      open-pull-requests-limit: 5
      assignees:
          - bueste
